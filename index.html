<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vocabulary App</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563EB;
            --primary-light: #60A5FA;
            --success: #059669;
            --danger: #DC2626;
            --bg-color: #F1F5F9;
            --card-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-bottom: 90px; }

        header { background: var(--primary); color: white; padding: 25px 20px 35px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; text-align: center; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); position: sticky; top: 0; z-index: 50; }
        .container { max-width: 600px; margin: -20px auto 0; padding: 0 15px; position: relative; z-index: 60; }

        .category-card { background: var(--card-bg); padding: 20px 25px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 20px rgba(0,0,0,0.04); margin-bottom: 15px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .category-card:hover { border-color: var(--primary-light); transform: translateY(-3px); }
        .category-info h2 { font-size: 20px; color: var(--primary); margin-bottom: 5px; }
        .category-info p { color: var(--text-muted); font-size: 14px; }
        .progress-badge { background: var(--success); color: white; padding: 5px 12px; border-radius: 20px; font-weight: 600; font-size: 14px; }

        .search-box { width: 100%; padding: 15px 20px; border-radius: 25px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); font-size: 16px; margin-bottom: 20px; outline: none; font-family: inherit; }
        .vocab-card { background: var(--card-bg); padding: 18px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; border-left: 5px solid var(--primary-light); }
        .vocab-card.completed-card { border-left-color: var(--success); opacity: 0.85; }
        
        .word-info .word { font-size: 18px; font-weight: 700; color: var(--text-main); display: block; }
        .word-info .meaning { font-size: 14px; color: var(--text-muted); margin-top: 3px; display: block; }
        
        .done-btn { background: #F8FAFC; border: 2px solid #E2E8F0; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text-muted); transition: 0.3s; }
        .done-btn.completed { background: var(--success); border-color: var(--success); color: white; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 10px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { border: none; background: none; color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: inherit;}
        .nav-item.active { color: var(--primary); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; align-items: flex-end; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 100%; max-width: 600px; padding: 25px 20px; border-radius: 25px 25px 0 0; animation: slideUp 0.3s; max-height: 85vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #E2E8F0; padding-bottom: 15px; margin-bottom: 15px;}
        .modal-word { font-size: 24px; font-weight: 700; color: var(--primary); }
        .close-btn { background: var(--bg-color); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-weight: bold;}
        .detail-group { margin-bottom: 12px; background: var(--bg-color); padding: 12px; border-radius: 12px; }
        .detail-label { font-size: 13px; font-weight: 700; color: var(--primary); display: block; margin-bottom: 4px;}
        .detail-text { font-size: 15px; line-height: 1.4; }

        .exam-card { background: white; padding: 25px 20px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; }
        .q-badge { display: inline-block; background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }
        .question-text { font-size: 19px; font-weight: 600; margin-bottom: 20px; }
        .option-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #E2E8F0; border-radius: 12px; background: white; cursor: pointer; font-size: 16px; font-family: inherit; font-weight: 500; transition: 0.2s; }
        .option-btn:hover { border-color: var(--primary-light); background: #EFF6FF; }
        
        .hidden { display: none !important; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<script src="data.js"></script>

<header>
    <h1 id="app-title">Pro Vocabulary</h1>
</header>

<div class="container view-section active" id="home-view">
    <div id="levels-container"></div>
</div>

<div class="container view-section" id="list-view">
    <button onclick="goHome()" style="background:none; border:none; color:var(--primary); font-size:16px; font-weight:600; margin-bottom:15px; cursor:pointer;">← লেভেল মেনু</button>
    <input type="text" class="search-box" id="searchInput" placeholder="শব্দ বা অর্থ খুঁজুন..." onkeyup="filterWords()">
    <div id="vocabList"></div>
</div>

<div class="container view-section" id="exam-view">
    <div class="exam-card hidden" id="exam-container">
        <span class="q-badge" id="q-type-badge">MCQ Test</span>
        <div class="question-text" id="exam-question"></div>
        <div id="options-container"></div>
    </div>
    <div style="text-align: center; padding: 40px 20px; color: var(--text-muted);" class="hidden" id="exam-empty">
        <h3>পরীক্ষার জন্য পর্যাপ্ত শব্দ নেই!</h3>
        <p>অন্তত ৫টি শব্দ পড়া শেষ (Done) করুন।</p>
    </div>
</div>

<div class="modal" id="detailsModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <div class="modal-word" id="modal-word"></div>
                <div style="color:var(--text-muted); font-size:15px;" id="modal-pron"></div>
            </div>
            <button class="close-btn" onclick="closeModal(null)">✕</button>
        </div>
        <div class="detail-group"><span class="detail-label">অর্থ</span><div class="detail-text" id="modal-meaning"></div></div>
        <div class="detail-group"><span class="detail-label">Synonyms</span><div class="detail-text" style="color:#059669;" id="modal-syn"></div></div>
        <div class="detail-group"><span class="detail-label">Antonyms</span><div class="detail-text" style="color:#DC2626;" id="modal-ant"></div></div>
        <div class="detail-group" id="exam-group"><span class="detail-label">বিগত পরীক্ষায়</span><div class="detail-text" style="color:#D97706;" id="modal-exam"></div></div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home')"><span style="font-size:20px">📚</span> লেভেল</button>
    <button class="nav-item" onclick="switchTab('exam')"><span style="font-size:20px">📝</span> পরীক্ষা</button>
</nav>

<script>
    let currentLevel = "";

    function loadApp() {
        const saved = localStorage.getItem('vocabProgress');
        if (saved) {
            const doneIds = JSON.parse(saved);
            vocabularyData.forEach(item => { if (doneIds.includes(item.id)) item.done = true; });
        }
        renderLevels();
    }

    function saveProgress() {
        const doneIds = vocabularyData.filter(v => v.done).map(v => v.id);
        localStorage.setItem('vocabProgress', JSON.stringify(doneIds));
        renderLevels();
    }

    function renderLevels() {
        const container = document.getElementById('levels-container');
        container.innerHTML = "";
        
        // ডাইনামিক লেভেল বের করা
        const levels = [...new Set(vocabularyData.map(item => item.level))];
        
        levels.forEach(level => {
            const levelWords = vocabularyData.filter(v => v.level === level);
            const doneCount = levelWords.filter(v => v.done).length;
            
            container.innerHTML += `
                <div class="category-card" onclick="openLevel('${level}')">
                    <div class="category-info">
                        <h2>${level}</h2>
                        <p>Total Words: ${levelWords.length}</p>
                    </div>
                    <div class="progress-badge">${doneCount}/${levelWords.length} Done</div>
                </div>
            `;
        });
    }

    function switchTab(tab) {
        document.querySelectorAll('.nav-item, .view-section').forEach(el => el.classList.remove('active'));
        if(tab === 'home') {
            document.querySelector('.nav-item:nth-child(1)').classList.add('active');
            document.getElementById('home-view').classList.add('active');
            document.getElementById('app-title').innerText = "Pro Vocabulary";
            renderLevels();
        } else {
            document.querySelector('.nav-item:nth-child(2)').classList.add('active');
            document.getElementById('exam-view').classList.add('active');
            document.getElementById('app-title').innerText = "Smart Exam";
            startExam();
        }
    }

    function openLevel(levelName) {
        currentLevel = levelName;
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById('list-view').classList.add('active');
        document.getElementById('app-title').innerText = levelName;
        document.getElementById('searchInput').value = "";
        renderWords(vocabularyData.filter(v => v.level === currentLevel));
    }

    function goHome() { switchTab('home'); }

    function renderWords(data) {
        const list = document.getElementById('vocabList');
        list.innerHTML = "";
        data.forEach(item => {
            const cardClass = item.done ? "vocab-card completed-card" : "vocab-card";
            const btnClass = item.done ? "done-btn completed" : "done-btn";
            list.innerHTML += `
                <div class="${cardClass}" onclick="openDetails(${item.id})">
                    <div class="word-info">
                        <span class="word">${item.word}</span>
                        <span class="meaning">${item.meaning.split(';')[0]}</span>
                    </div>
                    <button class="${btnClass}" onclick="toggleDone(event, ${item.id})">${item.done ? '✓' : '+'}</button>
                </div>
            `;
        });
    }

    function filterWords() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = vocabularyData.filter(v => v.level === currentLevel && (v.word.toLowerCase().includes(term) || v.meaning.includes(term)));
        renderWords(filtered);
    }

    function toggleDone(event, id) {
        event.stopPropagation();
        const item = vocabularyData.find(v => v.id === id);
        item.done = !item.done;
        saveProgress();
        filterWords();
    }

    function openDetails(id) {
        const item = vocabularyData.find(v => v.id === id);
        document.getElementById('modal-word').innerText = item.word;
        document.getElementById('modal-pron').innerText = `(${item.pron})`;
        document.getElementById('modal-meaning').innerText = item.meaning;
        document.getElementById('modal-syn').innerText = item.syn || "N/A";
        document.getElementById('modal-ant').innerText = item.ant || "N/A";
        document.getElementById('exam-group').style.display = item.exam ? 'block' : 'none';
        document.getElementById('modal-exam').innerText = item.exam;
        document.getElementById('detailsModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('detailsModal').style.display = 'none'; }

    // --- Advanced Exam Logic ---
    function extractCleanWord(str) {
        if(!str) return "";
        let firstPart = str.split(',')[0].split(';')[0];
        return firstPart.replace(/\s*\(.*?\)\s*/g, '').trim(); 
    }

    function startExam() {
        const doneWords = vocabularyData.filter(v => v.done);
        if (doneWords.length < 5) {
            document.getElementById('exam-container').classList.add('hidden');
            document.getElementById('exam-empty').classList.remove('hidden');
            return;
        }
        document.getElementById('exam-container').classList.remove('hidden');
        document.getElementById('exam-empty').classList.add('hidden');

        // Random Question Type (0: Meaning, 1: Synonym, 2: Antonym)
        let qType = Math.floor(Math.random() * 3);
        
        let validWords = doneWords;
        if(qType === 1) validWords = doneWords.filter(w => extractCleanWord(w.syn) !== "");
        if(qType === 2) validWords = doneWords.filter(w => extractCleanWord(w.ant) !== "");
        
        if(validWords.length === 0) { qType = 0; validWords = doneWords; } // Fallback to meaning

        const targetWord = validWords[Math.floor(Math.random() * validWords.length)];
        let question = "", correctAns = "";

        if(qType === 0) {
            document.getElementById('q-type-badge').innerText = "Word Meaning";
            document.getElementById('q-type-badge').style.background = "var(--primary)";
            question = `"${targetWord.word}" - এর সঠিক অর্থ কোনটি?`;
            correctAns = targetWord.meaning.split(';')[0];
        } else if(qType === 1) {
            document.getElementById('q-type-badge').innerText = "Synonym";
            document.getElementById('q-type-badge').style.background = "var(--success)";
            question = `"${targetWord.word}" - এর Synonym কোনটি?`;
            correctAns = extractCleanWord(targetWord.syn);
        } else {
            document.getElementById('q-type-badge').innerText = "Antonym";
            document.getElementById('q-type-badge').style.background = "var(--danger)";
            question = `"${targetWord.word}" - এর Antonym কোনটি?`;
            correctAns = extractCleanWord(targetWord.ant);
        }

        document.getElementById('exam-question').innerText = question;

        let options = [correctAns];
        while (options.length < 4) {
            let randomItem = vocabularyData[Math.floor(Math.random() * vocabularyData.length)];
            let randomWrong = "";
            
            if(qType === 0) randomWrong = randomItem.meaning.split(';')[0];
            else if(qType === 1) randomWrong = extractCleanWord(randomItem.syn);
            else randomWrong = extractCleanWord(randomItem.ant);

            if (randomWrong && !options.includes(randomWrong)) options.push(randomWrong);
        }
        
        options.sort(() => Math.random() - 0.5); // Shuffle

        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, correctAns);
            optContainer.appendChild(btn);
        });
    }

    function checkAnswer(btn, selected, correct) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.style.pointerEvents = 'none'); // Disable clicks

        if (selected === correct) {
            btn.style.background = 'var(--success)';
            btn.style.color = 'white';
            btn.style.borderColor = 'var(--success)';
            setTimeout(startExam, 1200);
        } else {
            btn.style.background = 'var(--danger)';
            btn.style.color = 'white';
            btn.style.borderColor = 'var(--danger)';
            buttons.forEach(b => {
                if(b.innerText === correct) {
                    b.style.border = '3px solid var(--success)';
                    b.style.color = 'var(--success)';
                    b.style.fontWeight = 'bold';
                }
            });
            setTimeout(startExam, 2500);
        }
    }

    window.onload = loadApp;
</script>

</body>
</html>
