<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Vocabulary App</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --success: #10B981;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 90px;
        }

        /* Header */
        header {
            background: var(--primary);
            color: white;
            padding: 25px 20px 35px 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        header h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; }

        .container { max-width: 600px; margin: -20px auto 0; padding: 0 15px; position: relative; z-index: 60; }

        /* Level Cards (Home) */
        .category-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .category-card:hover { border-color: var(--primary-light); transform: translateY(-3px); }
        .category-info h2 { font-size: 22px; color: var(--primary); margin-bottom: 5px; }
        .category-info p { color: var(--text-muted); font-size: 14px; }
        .progress-circle { width: 50px; height: 50px; border-radius: 50%; border: 4px solid var(--success); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--success); }

        /* Vocabulary List View */
        .search-box {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
            font-family: inherit;
        }
        .search-box:focus { box-shadow: 0 5px 20px rgba(79, 70, 229, 0.2); }

        .vocab-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            cursor: pointer;
            transition: 0.2s;
            border-left: 5px solid var(--primary-light);
        }
        .vocab-card:active { transform: scale(0.98); }
        .vocab-card.completed-card { border-left-color: var(--success); opacity: 0.8; }

        .word-info .word { font-size: 20px; font-weight: 700; color: var(--text-main); display: block; margin-bottom: 2px; }
        .word-info .pron { font-size: 13px; color: var(--primary); font-weight: 500; }
        .word-info .meaning { font-size: 15px; color: var(--text-muted); margin-top: 5px; display: block; }

        .done-btn {
            background: var(--bg-color);
            border: 2px solid var(--border);
            width: 40px; height: 40px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--text-muted);
        }
        .done-btn.completed { background: var(--success); border-color: var(--success); color: white; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-around;
            padding: 15px 10px 25px 10px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            z-index: 100;
        }
        .nav-item { border: none; background: none; color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; font-family: inherit;}
        .nav-item.active { color: var(--primary); }
        .nav-item::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: transparent; transition: 0.3s;}
        .nav-item.active::after { background: var(--primary); }

        /* Detailed Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(5px);
            display: none; align-items: flex-end; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white; width: 100%; max-width: 600px;
            padding: 30px 20px; border-top-left-radius: 30px; border-top-right-radius: 30px;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        .modal-word { font-size: 28px; font-weight: 700; color: var(--primary); }
        .modal-pron { font-size: 16px; color: var(--text-muted); }
        .close-btn { background: var(--bg-color); border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 18px; cursor: pointer; color: var(--text-main); }
        
        .detail-section { margin-bottom: 15px; background: var(--bg-color); padding: 15px; border-radius: 12px; }
        .detail-label { font-size: 14px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; display: block;}
        .detail-text { font-size: 16px; color: var(--text-main); line-height: 1.5; }
        .syn-text { color: #059669; font-weight: 500; }
        .ant-text { color: #DC2626; font-weight: 500; }
        .exam-tag { display: inline-block; background: #FEF3C7; color: #D97706; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 10px;}

        /* Exam View */
        .exam-section { text-align: center; padding-top: 20px; }
        .exam-card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .question-text { font-size: 20px; font-weight: 600; margin-bottom: 25px; color: var(--text-main); }
        .option-btn {
            display: block; width: 100%; padding: 16px; margin: 12px 0;
            border: 2px solid var(--border); border-radius: 15px;
            background: white; cursor: pointer; font-size: 16px;
            font-family: inherit; transition: 0.2s; font-weight: 500;
        }
        .option-btn:hover { border-color: var(--primary-light); background: #F5F3FF; }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .empty-state h3 { font-size: 20px; color: var(--text-main); margin-bottom: 10px; }

        /* Utility Classes */
        .hidden { display: none !important; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1 id="app-title">Smart Vocabulary</h1>
</header>

<div class="container view-section active" id="home-view">
    <div class="category-card" onclick="openLevel('Level 1')">
        <div class="category-info">
            <h2>Level 1</h2>
            <p id="level-progress-text">0/10 Words Learned</p>
        </div>
        <div class="progress-circle" id="level-progress-circle">0%</div>
    </div>
</div>

<div class="container view-section" id="list-view">
    <button onclick="goHome()" style="background:none; border:none; color:var(--primary); font-size:16px; font-weight:600; margin-bottom:15px; cursor:pointer; font-family:inherit;">← ব্যাক করুন</button>
    <input type="text" class="search-box" placeholder="শব্দ খুঁজুন (English বা বাংলা)..." onkeyup="filterWords()">
    <div id="vocabList"></div>
</div>

<div class="container view-section" id="exam-view">
    <div class="exam-section hidden" id="exam-container">
        <div class="exam-card">
            <div class="question-text" id="exam-question">প্রশ্ন লোড হচ্ছে...</div>
            <div id="options-container"></div>
        </div>
    </div>
    <div class="empty-state hidden" id="exam-empty">
        <h3>পরীক্ষা দেওয়ার মতো পর্যাপ্ত শব্দ নেই!</h3>
        <p>অন্তত ৪টি শব্দ পড়া সম্পন্ন (Done) করলে এখানে অটোমেটিক পরীক্ষা শুরু হবে।</p>
    </div>
</div>

<div class="modal" id="detailsModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <div class="modal-word" id="modal-word"></div>
                <div class="modal-pron" id="modal-pron"></div>
            </div>
            <button class="close-btn" onclick="closeModal(null)">✕</button>
        </div>
        
        <div class="detail-section">
            <span class="detail-label">বাংলা অর্থ</span>
            <div class="detail-text" id="modal-meaning"></div>
        </div>
        
        <div class="detail-section">
            <span class="detail-label">Synonyms (সমার্থক শব্দ)</span>
            <div class="detail-text syn-text" id="modal-syn"></div>
        </div>
        
        <div class="detail-section">
            <span class="detail-label">Antonyms (বিপরীত শব্দ)</span>
            <div class="detail-text ant-text" id="modal-ant"></div>
        </div>
        
        <div id="modal-exam-container">
            <span class="exam-tag" id="modal-exam"></span>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('home')">
        <span style="font-size: 20px;">🏠</span> হোম
    </button>
    <button class="nav-item" onclick="switchTab('exam')">
        <span style="font-size: 20px;">📝</span> পরীক্ষা
    </button>
</nav>

<script>
    // পিডিএফ থেকে এক্সট্রাক্ট করা সম্পূর্ণ ডাটাবেজ (Level 1 এর প্রথম অংশের উদাহরণ)
    // আপনি চাইলে নিচে আরও শব্দ হুবহু এই ফরম্যাটে যোগ করতে পারবেন।
    let vocabularyData = [
        { 
            id: 1, word: "Abandon", pron: "অ্যাব্যান্ডান", 
            meaning: "পরিত্যাগ করা।", 
            syn: "desert (ফেলে যাওয়া), relinquish (ছেড়ে দেওয়া), abdicate, discard (ছুড়ে ফেলা), give up (অভ্যাস ত্যাগ করা), forsake, quit, reject (প্রত্যাখ্যান করা), renounce (অস্বীকার করা), shun (এড়িয়ে যাওয়া)।", 
            ant: "retain (ধরে রাখা), embrace (সাদরে গ্রহণ করা), adopt (গ্রহণ করা), espouse (সমর্থন দেয়া), continue (চালিয়ে যাওয়া), pursue (পিছনে ছোটা), uphold (বহাল রাখা)।", 
            exam: "EMBA 2012; RU 2009; CU 2010-11; 14th Teacher Reg; Exim Bank 2018", 
            level: "Level 1", done: false 
        },
        { 
            id: 2, word: "Abate", pron: "অ্যাবেইট", 
            meaning: "প্রশমিত হওয়া; তীব্রতা কমে যাওয়া।", 
            syn: "subside (কমে যাওয়া), allay (কমানো), decline (হ্রাস করা), relieve (উপশম করা), diminish (কমে যাওয়া), soothe (কমানো), lessen (কমানো), dwindle (কমে যাওয়া), reduce (কমিয়ে আনা), decrease (কমানো), mitigate (প্রশমিত করা)।", 
            ant: "intensify (তীব্রতর করা), boost (উন্নত করা), magnify (বাড়িয়ে দেয়া), amplify (বৃদ্ধি করা), prolong (দীর্ঘায়িত করা), exacerbate (আরো খারাপ করা), aggravate, exasperate (অত্যন্ত রাগানো)।", 
            exam: "Agrani Bank: 2011; CU: 09-10; 40th BCS; RU: 2004", 
            level: "Level 1", done: false 
        },
        { 
            id: 3, word: "Abdicate", pron: "এ্যাবৃডিকেইট", 
            meaning: "(পদ/সিংহাসন) ত্যাগ করা; (দায়িত্ব/কর্তব্য) পালন না করে পরিত্যাগ করা।", 
            syn: "shirk (দায়িত্ব এড়িয়ে চলা), relinquish (সরে দাড়ানো), abandon (ত্যাগ করা), disclaim (দাবি পরিত্যাগ করা), disavow (অস্বীকার করা)।", 
            ant: "hold (আটকিয়ে রাখা), seize (ধরা), usurp (অন্যায়ভাবে দখল করা)।", 
            exam: "EMBA: 2012", 
            level: "Level 1", done: false 
        },
        { 
            id: 4, word: "Aberration", pron: "অ্যাবে-রেই-শন", 
            meaning: "(সঠিক নিয়ম থেকে) বিচ্যুতি; অস্বাভাবিক ঘটনা।", 
            syn: "divergence (বিচ্যুতি), deviation (বিচ্যুতি), abnormal (অস্বাভাবিক), queer (অদ্ভুত), anomalous (ব্যতিক্রমী)।", 
            ant: "conformity (সামঞ্জস্যতা), normal (স্বাভাবিক), compliance (মেনে নেওয়া)।", 
            exam: "Combined 5 Banks: 2019; PSC: 99; 12 BCS", 
            level: "Level 1", done: false 
        },
        { 
            id: 5, word: "Abhor", pron: "আহোর্", 
            meaning: "তাচ্ছিল্যভরে অত্যন্ত ঘৃণা করা।", 
            syn: "loathe (খুব অপছন্দ করা), detest (ঘৃণা করা), despise (অবজ্ঞা করা), hate (অপছন্দ করা), criticise, execrate, abominate (প্রচণ্ড ঘৃণা করা), disdain, belittle (তুচ্ছজ্ঞান করা)।", 
            ant: "desire (আকাঙ্ক্ষা করা), relish (উপভোগ করা), cherish (হৃদয়ে পোষণ করা), praise (গুণকীর্তন করা), admire (প্রশংসা করা)।", 
            exam: "DU: 2011-12; 30 BCS; BSCS", 
            level: "Level 1", done: false 
        },
        { 
            id: 6, word: "Able", pron: "এইব্‌ল্", 
            meaning: "সক্ষম; দক্ষ।", 
            syn: "skilled (দক্ষ), capable (যোগ্য), competent (সক্ষম), qualified (যোগ্য), fit (উপযুক্ত), adept (দক্ষ), dexterous (পারদর্শী), dexterity, expert (সুদক্ষ)।", 
            ant: "incapable (অক্ষম), inept (অপটু), clumsy (জবুথবু; আনাড়ি)।", 
            exam: "10th BCS; Rupali Bank: 2011", 
            level: "Level 1", done: false 
        },
        { 
            id: 7, word: "Abolish", pron: "অ্যা-ব-লিশ", 
            meaning: "শেষ করা; বর্জন করা; উচ্ছেদ করা।", 
            syn: "terminate (সমাপ্ত করা), annul (বাতিল করা), eliminate (বাদ দেওয়া), exterminate (নিশ্চিহ্ন করা), rescind (চুক্তি বাতিল করা), abrogate (রদ করা), repeal (প্রত্যাহার করা)।", 
            ant: "fabricate (নির্মাণ করা), forge (তৈরি করা), erect (নির্মাণ করা)।", 
            exam: "Exim Bank: 18; DU; JNU: 16-17", 
            level: "Level 1", done: false 
        },
        { 
            id: 8, word: "Abortive", pron: "অ্যাবোটি", 
            meaning: "নিষ্ফল; ব্যর্থ।", 
            syn: "futile (নিষ্ফল), vain (বিফল), sterile (অফলপ্রসূ), barren (অনুর্বর), debacle (পতন), unsuccessful (ব্যর্থ)।", 
            ant: "fertile (উর্বর), fruitful (ফলপ্রসূ), productive (কার্যকর), successful (সফল)।", 
            exam: "DU: 10-11; RU; Medical", 
            level: "Level 1", done: false 
        },
        { 
            id: 9, word: "Barren", pron: "ব্যারেন", 
            meaning: "অনুর্বর; বন্ধ্যা; নিষ্ফল।", 
            syn: "Infertile (অনুর্বর), Sterile (নিষ্ফলা), Unproductive (অনুৎপাদনশীল), Arid (অনুর্বর), Impotent (বলহীন)।", 
            ant: "Productive (উৎপাদনশীল), Fertile (উর্বর), Fecund (উর্বর)।", 
            exam: "Level 1 (B Series)", 
            level: "Level 1", done: false 
        },
        { 
            id: 10, word: "Candid", pron: "ক্যানডিড্", 
            meaning: "অকপট; মনখোলা।", 
            syn: "Frank (উদার), Sincere (সৎ), Frankness, Sincerity, Cordiality (আন্তরিকতা), Guileless (সরল), Outspoken (স্পষ্টভাষী), Bluntness।", 
            ant: "Artful (ছলনাময়), Insincere, Evasive (ছলনাকারী), Devious (প্রতারণাপূর্ণ), Diplomacy (কূটনীতি), Dishonesty, Hypocrisy (ভন্ডামি)।", 
            exam: "Premier Bank 2020; Dental: 20", 
            level: "Level 1", done: false 
        }
    ];

    // LocalStorage Setup
    function loadStorage() {
        const saved = localStorage.getItem('proVocabDone');
        if (saved) {
            const doneIds = JSON.parse(saved);
            vocabularyData.forEach(item => {
                if (doneIds.includes(item.id)) item.done = true;
            });
        }
        updateProgress();
    }

    function saveStorage() {
        const doneIds = vocabularyData.filter(v => v.done).map(v => v.id);
        localStorage.setItem('proVocabDone', JSON.stringify(doneIds));
        updateProgress();
    }

    function updateProgress() {
        const total = vocabularyData.length;
        const doneCount = vocabularyData.filter(v => v.done).length;
        const percent = Math.round((doneCount / total) * 100) || 0;
        
        document.getElementById('level-progress-text').innerText = `${doneCount}/${total} Words Learned`;
        document.getElementById('level-progress-circle').innerText = `${percent}%`;
    }

    // Navigation and Views
    function switchTab(tab) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        
        if(tab === 'home') {
            document.querySelector('.nav-item:nth-child(1)').classList.add('active');
            document.getElementById('home-view').classList.add('active');
            document.getElementById('app-title').innerText = "Smart Vocabulary";
        } else if (tab === 'exam') {
            document.querySelector('.nav-item:nth-child(2)').classList.add('active');
            document.getElementById('exam-view').classList.add('active');
            document.getElementById('app-title').innerText = "Exam Center";
            startExam();
        }
    }

    function openLevel(levelName) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.getElementById('list-view').classList.add('active');
        document.getElementById('app-title').innerText = levelName;
        renderWords();
    }

    function goHome() {
        switchTab('home');
    }

    // List Rendering
    function renderWords(data = vocabularyData) {
        const list = document.getElementById('vocabList');
        list.innerHTML = "";
        data.forEach(item => {
            const cardClass = item.done ? "vocab-card completed-card" : "vocab-card";
            const btnClass = item.done ? "done-btn completed" : "done-btn";
            const btnIcon = item.done ? "✓" : "";
            
            list.innerHTML += `
                <div class="${cardClass}" onclick="openDetails(${item.id})">
                    <div class="word-info">
                        <span class="word">${item.word}</span>
                        <span class="meaning">${item.meaning.split(';')[0]}</span> </div>
                    <button class="${btnClass}" onclick="toggleDone(event, ${item.id})">${btnIcon}</button>
                </div>
            `;
        });
    }

    function filterWords() {
        const term = document.querySelector('.search-box').value.toLowerCase();
        const filtered = vocabularyData.filter(v => 
            v.word.toLowerCase().includes(term) || 
            v.meaning.includes(term)
        );
        renderWords(filtered);
    }

    // Actions
    function toggleDone(event, id) {
        event.stopPropagation();
        const item = vocabularyData.find(v => v.id === id);
        item.done = !item.done;
        saveStorage();
        renderWords(vocabularyData.filter(v => document.querySelector('.search-box').value ? (v.word.toLowerCase().includes(document.querySelector('.search-box').value.toLowerCase()) || v.meaning.includes(document.querySelector('.search-box').value.toLowerCase())) : true));
    }

    function openDetails(id) {
        const item = vocabularyData.find(v => v.id === id);
        document.getElementById('modal-word').innerText = item.word;
        document.getElementById('modal-pron').innerText = `(${item.pron})`;
        document.getElementById('modal-meaning').innerText = item.meaning;
        document.getElementById('modal-syn').innerText = item.syn;
        document.getElementById('modal-ant').innerText = item.ant;
        
        const examSpan = document.getElementById('modal-exam');
        if(item.exam) {
            examSpan.innerText = "বিগত পরীক্ষায়: " + item.exam;
            examSpan.style.display = 'inline-block';
        } else {
            examSpan.style.display = 'none';
        }

        document.getElementById('detailsModal').style.display = 'flex';
    }

    function closeModal(e) {
        document.getElementById('detailsModal').style.display = 'none';
    }

    // Exam Logic
    function startExam() {
        const doneWords = vocabularyData.filter(v => v.done);
        const examContainer = document.getElementById('exam-container');
        const emptyMsg = document.getElementById('exam-empty');

        if (doneWords.length < 4) {
            examContainer.classList.add('hidden');
            emptyMsg.classList.remove('hidden');
            return;
        }

        examContainer.classList.remove('hidden');
        emptyMsg.classList.add('hidden');

        // Pick a random word from the done list
        const correctItem = doneWords[Math.floor(Math.random() * doneWords.length)];
        document.getElementById('exam-question').innerText = `"${correctItem.word}" - এর সঠিক অর্থ কোনটি?`;

        // Generate options (1 correct, 3 random wrong)
        let options = [correctItem.meaning];
        let attempts = 0;
        while (options.length < 4 && attempts < 50) {
            let randomItem = vocabularyData[Math.floor(Math.random() * vocabularyData.length)];
            if (!options.includes(randomItem.meaning)) {
                options.push(randomItem.meaning);
            }
            attempts++;
        }
        
        // Shuffle options
        options.sort(() => Math.random() - 0.5);

        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";
        options.forEach(opt => {
            optContainer.innerHTML += `<button class="option-btn" onclick="checkAnswer(this, '${opt}', '${correctItem.meaning}')">${opt.split(';')[0]}</button>`;
        });
    }

    function checkAnswer(btnElement, selected, correct) {
        // Disable all buttons
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (selected === correct) {
            btnElement.style.backgroundColor = 'var(--success)';
            btnElement.style.color = 'white';
            btnElement.style.borderColor = 'var(--success)';
            setTimeout(startExam, 1200); // 1.2 second pause before next question
        } else {
            btnElement.style.backgroundColor = '#EF4444'; // Red for wrong
            btnElement.style.color = 'white';
            btnElement.style.borderColor = '#EF4444';
            
            // Highlight the correct one
            buttons.forEach(b => {
                if(b.innerText === correct.split(';')[0]) {
                    b.style.border = '3px solid var(--success)';
                    b.style.color = 'var(--success)';
                }
            });
            setTimeout(startExam, 2000); // 2 second pause so user can read the correct answer
        }
    }

    // App Initialization
    window.onload = () => {
        loadStorage();
    };
</script>

</body>
</html>
